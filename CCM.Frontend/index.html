<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Customer Creation Module</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">&#127970;</div>
    <h1>Customer Creation Module</h1>
    <p>Sign in to continue</p>
    <div id="loginErr" class="alert alert-error" style="display:none"></div>
    <div class="form-group"><label>Username</label><input id="loginUser" placeholder="Username"/></div>
    <div class="form-group"><label>Password</label><input id="loginPass" type="password" placeholder="Password"/></div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;justify-content:center" onclick="Auth.login()">Sign In</button>
    <div style="margin-top:12px;font-size:.76rem;color:#aaa;text-align:center">requestor / teamlead / manager / admin &mdash; pass123</div>
  </div>
</div>
<div id="appShell" style="display:none">
  <header>
    <div class="hdr-left"><span class="logo">&#127970;</span><span class="app-title">Customer Creation Module</span></div>
    <div class="hdr-right"><span id="userChip" class="user-chip"></span><button class="btn btn-sm btn-gray" onclick="Auth.logout()">Logout</button></div>
  </header>
  <div class="layout">
    <nav id="sidebar"><div class="nav-section">MENU</div></nav>
    <main id="mainContent"></main>
  </div>
</div>
<div class="overlay" id="modal">
  <div class="modal" id="modalInner">
    <button class="close-btn" onclick="UI.closeModal()">&#10005;</button>
    <div id="modalContent"></div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/requests.js"></script>
<script src="js/queue.js"></script>
<script src="js/users.js"></script>
<script src="js/audit.js"></script>
<script src="js/sapconfig.js"></script>
<script src="js/app.js"></script>
</body>
</html>
